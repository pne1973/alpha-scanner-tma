<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Scanner - Trading Intelligence</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-secondary-bg-color: #f4f4f7;
            --tg-theme-text-color: #000000;
        }
        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        .glass-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .pulse-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="flex justify-between items-start mb-6">
        <div>
            <h1 id="user-greeting" class="text-2xl font-black tracking-tight">Alpha Scanner</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full pulse-live"></span>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-60">Mercado em Tempo Real</p>
            </div>
        </div>
        <div class="glass-card px-3 py-1 text-[10px] font-bold border border-black/10">v34.12-ALPHA</div>
    </header>

    <main id="signals-list" class="space-y-5"></main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const mockSignals = [
            { pair: "TON / USDT", network: "TON", score: 96, tech: "RSI 24 (Oversold)", whale: "7 Baleias Ativas", volume: "$12.4M", color: "#0088cc", ca: "EQB...ton-contract" },
            { pair: "SOL / USDC", network: "Solana", score: 88, tech: "Golden Cross (1H)", whale: "Fluxo Institucional", volume: "$840M", color: "#14f195", ca: "EPj...sol-contract" }
        ];

        function copyAction(btn, text) {
            // Feedback Visual Imediato
            const originalText = btn.innerText;
            btn.innerText = "COPIADO!";
            btn.style.backgroundColor = "#22c55e";

            // Tentativa de Cópia
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("Contrato copiado: " + text);
            } catch (err) {
                console.error("Erro ao copiar", err);
            }
            document.body.removeChild(textArea);

            // Resetar botão após 2 segundos
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "#2481cc";
            }, 2000);
        }

        function render() {
            const container = document.getElementById('signals-list');
            container.innerHTML = mockSignals.map(s => `
                <div class="glass-card p-5 border-l-4" style="border-left-color: ${s.color}">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-black uppercase bg-black/5 px-2 py-0.5 rounded">${s.network}</span>
                            <h3 class="text-xl font-bold mt-1">${s.pair}</h3>
                        </div>
                        <div class="text-right">
                            <span class="text-3xl font-black" style="color: ${s.score > 85 ? '#22c55e' : '#eab308'}">${s.score}</span>
                            <p class="text-[8px] font-bold opacity-40">ALPHA SCORE</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-5 text-xs font-bold">
                        <div class="bg-black/5 p-3 rounded-xl"><p class="opacity-50 text-[9px] mb-1">TÉCNICO</p>${s.tech}</div>
                        <div class="bg-black/5 p-3 rounded-xl"><p class="opacity-50 text-[9px] mb-1">WHALES</p><span class="text-blue-600">${s.whale}</span></div>
                    </div>
                    <div class="flex items-center justify-between pt-2 border-t border-black/5">
                        <p class="text-sm font-mono font-bold">${s.volume}</p>
                        <button onclick="copyAction(this, '${s.ca}')" class="bg-[#2481cc] text-white px-6 py-2 rounded-xl text-xs font-bold active:scale-95">
                            Copiar CA
                        </button>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
            if (tg.initDataUnsafe?.user?.first_name) {
                document.getElementById('user-greeting').textContent = `Olá, ${tg.initDataUnsafe.user.first_name}`;
            }
        });
    </script>
</body>
</html>
