<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Rewards</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .coin-btn { transition: transform 0.1s; touch-action: manipulation; }
        .coin-btn:active { transform: scale(0.9); }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; }
    </style>
</head>
<body class="flex flex-col items-center justify-between h-screen p-6">

    <div class="text-center mt-8">
        <p class="text-gray-400 text-sm font-bold uppercase tracking-widest">O teu Saldo Alpha</p>
        <h1 id="balance" class="text-6xl font-black mt-2">0</h1>
    </div>

    <div class="flex flex-col items-center">
        <button onclick="minePoints()" class="coin-btn w-48 h-48 bg-gradient-to-tr from-blue-600 to-cyan-400 rounded-full shadow-[0_0_50px_rgba(37,99,235,0.5)] flex items-center justify-center border-8 border-white/20">
            <span class="text-5xl font-black">A</span>
        </button>
        <p class="mt-6 text-blue-400 font-bold animate-pulse">TOCA PARA GANHAR</p>
    </div>

    <div class="glass w-full p-5 mb-4">
        <p class="text-center text-[10px] font-bold opacity-60 mb-3 uppercase">Previsão do Mercado (Próximas 24h)</p>
        <div class="flex gap-3">
            <button onclick="guess('up')" class="flex-1 bg-green-500/20 border border-green-500 text-green-500 py-3 rounded-xl font-bold text-sm">VAI SUBIR ▲</button>
            <button onclick="guess('down')" class="flex-1 bg-red-500/20 border border-red-500 text-red-500 py-3 rounded-xl font-bold text-sm">VAI CAIR ▼</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let points = parseInt(localStorage.getItem('alpha_points')) || 0;
        document.getElementById('balance').innerText = points.toLocaleString();

        function minePoints() {
            points += 1;
            updateDisplay();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function guess(type) {
            tg.showConfirm(`Confirmas a tua previsão de que o mercado vai ${type === 'up' ? 'SUBIR' : 'CAIR'}?`, (ok) => {
                if (ok) {
                    tg.showAlert("Previsão registada! Volta em 24h para colher os teus bónus.");
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }
            });
        }

        function updateDisplay() {
            document.getElementById('balance').innerText = points.toLocaleString();
            localStorage.setItem('alpha_points', points);
        }

        // Estilizar para o Telegram
        document.addEventListener('DOMContentLoaded', () => {
            tg.ready();
            if (tg.initDataUnsafe?.user) {
                console.log("Bem-vindo,", tg.initDataUnsafe.user.first_name);
            }
        });
    </script>
</body>
</html>
